# Plugin: Căn cước 2024 - Mặt sau (sau 01/07/2024) — DOC-TYPE-010
# Ảnh mẫu thật: samples/cccd_2024_back/dinh-nam.jpeg. Có QR lớn + MRZ TD1 + "Nơi cư trú",
# "Nơi đăng ký khai sinh", "BỘ CÔNG AN". QR (cccd_qr) cho định danh (tên CÓ DẤU); OCR bù
# nơi cư trú/khai sinh/ngày cấp/hạn dùng. MRZ chỉ dùng cho idNumber + dateOfExpiry khi
# checksum đúng (OCR thường phá ký tự '<' → bỏ qua); KHÔNG lấy tên từ MRZ (không dấu).
docType: cccd_2024_back
displayName: "Căn cước 2024 - Mặt sau"
version: "1.0"
ready: true
family: cccd

classify:
  anchors: ["Nơi cư trú", "Nơi đăng ký khai sinh", "BỘ CÔNG AN", "MINISTRY OF PUBLIC SECURITY"]

structuredData:
  - kind: qr
    parser: cccd_qr
    mapsTo: [idNumber, fullName, dateOfBirth, sex, placeOfResidence, dateOfIssue]
  - kind: mrz
    format: td1
    parser: mrz_td1
    mapsTo: [idNumber, dateOfExpiry]   # tên MRZ không dấu → KHÔNG dùng

extraction:
  strategy: label_anchored
  fields:
    - name: idNumber
      labels: ["Số định danh", "Personal identification number"]
      take: right_of_label
      source: [structured, ocr]
      type: digits
      normalize: [fixDigits, digitsOnly]
      validate: { regex: '^\d{12}$' }
      crossCheckProvince: true
    - name: fullName
      take: below_label
      source: [structured, ocr]        # tên có dấu từ QR (mặt sau không in tên)
      type: text_vi
    - name: dateOfBirth
      labels: ["Ngày sinh", "Date of birth"]
      take: date_after_label
      source: [structured, ocr]
      type: date
    - name: sex
      labels: ["Giới tính", "Sex"]
      take: right_of_label
      source: [structured, ocr]
      type: sex
    - name: placeOfResidence
      labels: ["Nơi cư trú", "Place of residence"]
      take: right_of_label_or_below
      source: [structured, ocr]
      type: text_vi
      multiline: true
      normalize: [collapseSpaces, dictFix]
    - name: placeOfBirth
      labels: ["Nơi đăng ký khai sinh", "Place of birth"]
      take: right_of_label_or_below
      type: text_vi
      normalize: [collapseSpaces, dictFix]
    - name: dateOfIssue
      labels: ["Ngày, tháng, năm cấp", "Date of issue"]
      take: date_after_label
      source: [structured, ocr]
      type: date
    - name: dateOfExpiry
      labels: ["Ngày, tháng, năm hết hạn", "Date of expiry"]
      take: date_after_label
      source: [structured, ocr]
      type: date
      checks: [warn_if_expired]
    - name: issuedBy
      labels: ["BỘ CÔNG AN", "Ministry of Public Security"]
      take: right_of_label
      type: text_vi
      required: false

confidence:
  fieldWeights:
    idNumber: 0.3
    fullName: 0.3
    dateOfBirth: 0.2
    default: 0.1
